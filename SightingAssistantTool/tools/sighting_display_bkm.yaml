version: 1
kind: agent
description: An agent to check an HSD id belonging to the category of "Display" and suggest isolation and log collection BKM.
env: 
- INTEL_USERNAME
- INTEL_PASSWORD

params:
- name: id 
  type: int
  description: The HSD id   
  optional: false 
- name: category
  type: str
  description: The issue category that the HSD is classified into. One of {Display, Display Audio, Gaming, Media, Content Protection, Performance, Corruption, BSOD, TDR, Underrun, App Crash, Hard Hang, Black Screen, Yellow Bang, WHQL, IGCC/IGS/ARC, GOP, DPMO, Installer, AI}
  optional: false
- name: hsd_info_file 
  type: str 
  description: The path to the file containting a HSD ID's info that gets passed in to this tool (sighting_get_category). That was previously produced by sighting_read_article tool.
  optional: true
- name: attachment_info_file 
  type: str 
  description: The path to the file containting a HSD ID's attachments info (attachments attached to the HSD). That was previously produced by sighting_attachments tool.
  optional: true

prompt: |
  OBJECTIVE:
  Your main task is to analyze HSD (Hardware/Software Defect) articles belonging to the category of "Display" 
  and suggest a log collection BKM according to the "scenario" of the issue in a clear, actionable technical manner for engineering teams.

  CONTEXTUAL KNOWLEDGE:
  # Add contextual knowledge here if any. 
  



  All of the following headings are "scenario"(s) of an issue related to Display. The content below them is the isolation section plus the log collection BKM that should be suggested.

  CONTENT:
  **HSD_INFO_FILE:**
  -------------

  ```
  {{ readFromFileParam "hsd_info_file" }}
  ```

  **ATTACHMENT_INFO_FILE:**
  -------------

  ```
  {{ readFromFileParam "attachment_info_file" }}
  ```

  Generic: 
  - Follow this Wiki ETW Debug TPT Improvement (https://wiki.ith.intel.com/spaces/GfxDisplay/pages/1195705375/ETW+Debug+TPT+Improvement) to collect ETL trace log while you are reproducing issue. 
  - Detailed repo steps/scenarios when the ETL is captured must be mentioned in the HSD.
  - If log was collected by external customer, please follow ETW Debug TPT Improvement#Howtoperformsymboldecode (https://wiki.ith.intel.com/display/GfxDisplay/ETW+Debug+TPT+Improvement#ETWDebugTPTImprovement-Howtoperformsymboldecode)
    instruction to merge ETL log before you upload to HSD. 
  - Please also run dispdiag.exe in command prompt and attach output log for every Display related issues. 

  Display flicker, Garbage flashing, Pipe Underrun:
  - Isolation:
    - Verify the issue with latest ci-master or bug check driver, last known good BKC, older platform and 3rd party platform. 
    - Check Registry key HKLM\System\CurrentControlSet\Control\Video\{guid}\{driver key}\UnderRunCountPipe* see if underrun happened. 
    - See if disabling following feature(test) helps the issue: 
      1. 
      Test Name: Disable PSR  
      How to:
        Featuretestcontrol registry:
          FtrPsrDisable: Bit 11; <-- Set 1 to this bit would disable Psr.
      2. 
      Test Name: Disable PSR2  
      How to:
        PSR2Disable registry:
          – Set 1 to this key value would disable PSR2.
      3. 
      Test Name: Disable FBC  
      How to:
        Featuretestcontrol registry:
          FtrFbcDisable: Bit 1; <-- Set 1 to this bit would disable Fbc.
      4. 
      Test Name: Disable SAGV  
      How to:
        Disable SAGV through BIOS, Intel Advanced Menu -> Memory Configurations.
        Maybe on different location depending on customer's BIOS menu layout.
      5. 
      Test Name: Disable Render Compression  
      How to:
        Displayfeaturecontrol registry:
          RendCompEnabledFlag: Bit 2; – Set 0 to this bit would disable RC.
      6. 
      Test Name: Disable DC5  
      How to:
        DisplayPcfeaturecontrol registry:
          DisableDC5: // Bit 13 <-- Set 1 to this bit would disable DC5.
      7. 
      Test Name: Disable DC6  
      How to:
        DisplayPcfeaturecontrol registry:
          DisableDC6: // Bit 14 <-- Set 1 to this bit would disable DC6.
      8. 
      Test Name: Disable DC9  
      How to:
        DisplayPcfeaturecontrol registry:
          DisableDC9: // Bit 15 <-- Set 1 to this bit would disable DC9.
      9. 
      Test Name: Disable CxSR  
      How to:
        Featuretestcontrol registry:
          FtrCxsrDisable: Bit 0 <-- Set 1 to this bit would disable CxSR.
      10. 
      Test Name: Disable C-State
      How to:
        Disable C-states through BIOS, 
        Intel Advanced menu -> Power and performance -> C states -> disable. 
        Maybe on different location depending on customer's BIOS menu layout.
        If Disabling C-state helps the issue, please continue break down which C-state level helps the issue.

  - Log collection:
    - Collect Display ETL for pass and fail cases.
    - Use EventGenerator.exe (ETW Debug TPT Improvement)(https://wiki.ith.intel.com/display/GfxDisplay/ETW+Debug+TPT+Improvement#ETWDebugTPTImprovement-HowtouseMarkerEvents) 
      to insert a marker event when failing symptom observed.

  Garbage on Screen:
  - Isolation:
    - Press print screen to dump the frame buffer.
    - If screen capture can see the garbage, or the external monitor can see the same garbage in clone mode,
      try "DisableE2ECompression" = 1 to see if it helps the issue.
    - If not, check if Pipe Underrun occurs and try disabling PSR / PSR2 to see if it helps the issue.
  - Log collection:
    - Collect Display ETL for pass and fail cases.
    - Use EventGenerator.exe (ETW Debug TPT Improvement)(https://wiki.ith.intel.com/display/GfxDisplay/ETW+Debug+TPT+Improvement#ETWDebugTPTImprovement-HowtouseMarkerEvents) 
      to insert a marker event when failing symptom observed.

  Black Screen:	
  - Isolation:
    - Press "Caps lock" see if system is hard hang. (Please reach out to platform team for system hard hang case)
    - Plug in or re-plug external monitor see if system can be recovered. 
    - Reduce Resolution or Refresh rate see if issue is avoided.
    - If black screen seen on external monitor:
      - Swap different port / dongle / dock / cable or Display interface (DP/HDMI). 
      - Try without dock or dongle to see if issue still occurs. 

  - Log collection:
    - **eDP black screen**: Please collect BootTrace ETL and press Win key + Ctrl + Shift + B to generate blackbox dump. 
    - Collect blackbox dump from C:\WINDOWS\LiveKernelReports\ and upload to GDHM.
    - Reference: https://support.microsoft.com/en-us/windows/troubleshooting-black-or-blank-screens-in-windows-51ef7b96-47cb-b454-fcab-fac643784457
    - **External monitor black screen**: Please collect Display ETL since monitor or dock is plugged in till issue is observed. 

  Display Audio failure:
  - Isolation:
    - Verify the issue with latest ci-master or bug check driver, last known good BKC, older platform and 3rd party platform.
    - Check issue with and without ISST driver.
    - ISST + ACX
    - MSFT + ACX
  - Log collection:
    - Collect Display ETL trace log + Audio DiagnosticDac log. (TBD) (https://wiki.ith.intel.com/spaces/GfxDisplay/pages/1691040635/DiagnosticDac)
    - Collect MSDN Matthew logs ACX+Codec#ACXCodec-StepstoCollectMSDNMatthewlogs (https://wiki.ith.intel.com/display/GfxDisplay/ACX+Codec#ACXCodec-StepstoCollectMSDNMatthewlogs:)

  GOP issue (Before entering OS):
  - Isolation:
    - Verify the issue with latest GOP and last known good BKC (in case BIOS regression).
    - GOP Dashboard:
      master / PTL: QuickBuild - ubit/gfx/dynamic/run/products/gop/ci/master (https://ubit-gfx.intel.com/overview/33079)
      LNL: QuickBuild - ubit/gfx/dynamic/run/products/gop/ci/releases/ww352024_lnl (https://ubit-gfx.intel.com/overview/33284)
      MTL / ARL: QuickBuild - ubit/gfx/dynamic/run/products/gop/ci/releases/ww342024_mtl (https://ubit-gfx.intel.com/overview/33271)
  - Log collection:
    - Attach VBT File to HSD.
    - Collect GOP log from DEBUG GOP.
    - How to collect GOP/OPROM logs and setup serial port configuration - Graphics Display Wiki - Intel Enterprise Wiki (https://wiki.ith.intel.com/pages/viewpage.action?pageId=2678093234)

  LACE related issue:
  - Isolation:
    - Disabling LACE from IGS see if issue goes away.
  - Log Collection:
    - Note: The registry can't be shared to customer before confirming with dev.
    1. Add registry DWORD "EnableDebugLogs"=1 under path "Computer\HKEY_LOCAL_MACHINE\SOFTWARE\Intel\Display\DisplayService"
    2. Reboot
    3. Replicate issue and collect log (IntelUmService-{time}.log) under folder c:\Intel\. 


  Brightness related issue:
  - Isolation:
    - Disabling Feature Test control from RegEdit.
    - Verify if brightness is changing while moving the brightness slider in taskbar.
    - Verify if brightness is changing through keyboard shortcuts.
    - Check whether the option "Change Brightness automatically when lighting changes" is enabled or not.
    - Try different settings under "Change brightness based on content" in System settings > Display. 

  - Log Collection:
    - Follow this Wiki ETW Debug TPT Improvement (https://wiki.ith.intel.com/spaces/GfxDisplay/pages/1195705375/ETW+Debug+TPT+Improvement) to collect ETL trace log while you are reproducing issue. 

  HDR/SDR related issue:
  - Isolation:
    - Check if the issue persists in AC mode(power).
    - Check if panel supports HDR. 

  - Log Collection:
    - Follow this Wiki ETW Debug TPT Improvement (https://wiki.ith.intel.com/spaces/GfxDisplay/pages/1195705375/ETW+Debug+TPT+Improvement) to collect Boot ETL trace log while you are reproducing issue. 

  INSTRUCTIONS:
  - Decide an appropriate scenario for the HSD based on the (hsd_info_file) and (attachment_info_file).
  - The determination of the scenario is solely your responsibility.  
  - If you are not able to largely approximate a scenario, you may default to the Generic Scenario.
  - The ID of the HSD is the param {{.id}}
  - Follow this step-by-step process:
    1. Depending on the scenario, suggest the corresponding content of the isolation plus the Log Collection BKM.
    2. Mention the exact scenario of the Display issue that was determined by you, and mention the associated isolation section content plus the Log Collection BKM.

  OUTPUT FORMAT:
  Keep in mind to print the section contents as is. No modifications.
  Use clear formatting and technical language. Clearly explain if you are not able to suggest a proper Log Collection BKM/isolation steps section. 
