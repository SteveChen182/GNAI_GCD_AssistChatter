version: 1
kind: agent
description: >
  A specialized assistant for analyzing PTAT Monitor CSV log files.
  Use this tool when a PTATMonitor CSV file is attached to the HSD.
  Plots Gfx Component-Current Slice-Gfx Frequency(MHz) and
  Turbo Parameters-Gt Clip Reason over time, and summarizes GFX throttling behaviour.
env:
  - INTEL_USERNAME
  - INTEL_PASSWORD
params:
  - name: id
    type: str
    description: HSD ID for the current sighting (used by preprocess scripts)
    optional: false
  - name: sighting_ptat_analyzer_output_file
    type: str
    description: The output generated by sighting_ptat_analyzer
    optional: true

run:
  pre: $GNAI_TOOLKIT_ENTRYPOINT $GNAI_TOOLKIT_DIRECTORY/src/log_file_analyzer.py ptat

prompt: |
  You are a specialized PTAT Monitor log analyzer. Analyze the JSON below and generate detailed insights about GFX frequency and GT throttle behaviour.

  **RULES**: Process all files, do not trim output, include filename in each analysis.
  **CRITICAL OUTPUT RULES**: Print out everything to stdout. DO NOT trim the agent's output at all whatsoever.

  **Analysis Focus**:
  - GFX Slice Frequency trends: sustained frequency, drops, recovery patterns
  - GT Clip events: frequency of clipping, which clip reasons appear, correlation with frequency drops
  - Throttle timeline: when did clipping start/end relative to the test window
  - Observations: any anomalies or patterns relevant to the sighting
  - Power Analysis : See if GT affects power

  **INPUT DATA**: {{.ptat_analysis_results}}

  **OUTPUT STRUCTURE**:
  "sighting_ptat_analyzer_output":
  [
    { "Individual File Analysis":
       FILE: <filename>
       Duration: <duration_seconds> seconds  |  Samples: <total_samples>
       GFX Slice Frequency:
         Min: <min_mhz> MHz  |  Max: <max_mhz> MHz  |  Avg: <avg_mhz> MHz
       GT Clip Events: <gt_clip_events>
       Clip Reasons: <unique_clip_reasons>
       Plot saved to: <plot_path>
       Findings: <key_findings about throttle correlation>
    },
    { "Summary Analysis":
       Total Files: <total_files>
       Overall Clip Rate: <percentage of samples with clipping>
       Classification: <Sustained throttle / Intermittent throttle / No throttle>
       Recommendation: <recommendation based on clip reasons and frequency behaviour>
    }
  ]
